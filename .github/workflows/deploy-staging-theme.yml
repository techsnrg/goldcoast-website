name: Deploy Theme To Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging-theme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync child theme to staging via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.HOSTINGER_SFTP_HOST }}
          username: ${{ secrets.HOSTINGER_SFTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SFTP_PORT }}
          uploads: |
            ./goldcoast-astra-child/ => ${{ secrets.STAGING_THEME_PATH }}/
