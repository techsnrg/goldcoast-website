name: Deploy Theme To Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging-theme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Ensure remote theme directory exists
        env:
          HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SFTP_USERNAME }}
          PASSWORD: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          TARGET_PATH: ${{ secrets.STAGING_THEME_PATH }}
        run: |
          sshpass -p "$PASSWORD" ssh \
            -p "$PORT" \
            -o StrictHostKeyChecking=no \
            "$USERNAME@$HOST" \
            "mkdir -p '$TARGET_PATH'"

      - name: Copy child theme to staging
        env:
          HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SFTP_USERNAME }}
          PASSWORD: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          TARGET_PATH: ${{ secrets.STAGING_THEME_PATH }}
        run: |
          sshpass -p "$PASSWORD" scp \
            -P "$PORT" \
            -o StrictHostKeyChecking=no \
            -r goldcoast-astra-child/* \
            "$USERNAME@$HOST:$TARGET_PATH/"
